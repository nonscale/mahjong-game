<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>효도 마작 - 같은 패 맞추기</title>
    <link rel="stylesheet" href="style.css?v=9.9">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.png">
    <meta name="theme-color" content="#8b5e34">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* 캐시 문제를 해결하기 위해 가장 중요한 선택 스타일을 여기에 직접 선언합니다. */
        .tile.selected {
            background: #ff0000 !important;
            border: 3px solid #7a0000 !important;
            outline: 6px solid rgba(255, 0, 0, 0.4) !important; /* 외곽선 추가로 더 넓어보이게 */
            box-shadow: 
                0 0 40px rgba(255, 0, 0, 1) !important,
                0 0 80px rgba(255, 0, 0, 0.6) !important,
                0 0 120px rgba(255, 0, 0, 0.3) !important; /* 광채 범위 대폭 확장 */
            z-index: 1000 !important; 
            transform: translate(calc(-50% + var(--tx, 0px)), calc(-50% + var(--ty, 0px) - 25px)) !important; /* 더 높이 들림 */
            animation: selected-pulse 1s infinite alternate !important; /* 맥동 효과 추가 */
        }
        @keyframes selected-pulse {
            from { outline-width: 4px; filter: brightness(1); }
            to { outline-width: 12px; filter: brightness(1.3); }
        }
        .tile.selected .face {
            filter: drop-shadow(0 0 5px #ffffff) drop-shadow(0 0 10px #ff0000) !important;
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>단아한 패 맞추기</h1>
            <div class="stats">
                <div class="stat-item">
                    <span class="label">남은 패</span>
                    <span id="remaining-count">0</span>
                </div>
                <div class="stat-item">
                    <span class="label">시간</span>
                    <span id="timer">00:00</span>
                </div>
                <div class="stat-item">
                    <span class="label">점수</span>
                    <span id="score">0</span>
                </div>
                <div class="stat-item highlight">
                    <span class="label">콤보</span>
                    <span id="combo">0</span>
                </div>
            </div>
        </header>

        <main id="game-container">
            <div id="board"></div>
        </main>

        <footer>
            <button id="hint-btn" class="sub-btn">도움말</button>
            <button id="reset-btn" class="main-btn">새 게임</button>
            <button id="shuffle-btn" class="sub-btn">섞기</button>
        </footer>

        <!-- 메시지 오버레이 -->
        <div id="overlay" class="hidden">
            <div class="msg-box">
                <h2 id="msg-title">참 잘하셨어요!</h2>
                <p id="msg-body">모든 패를 맞추셨습니다.</p>
                <button id="restart-btn">다시 시작하기</button>
            </div>
        </div>
    </div>
    <script src="game.js?v=9.9"></script>
</body>
</html>
